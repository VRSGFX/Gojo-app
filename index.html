<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gojo Vip · Server Status</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0508;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, rgba(155, 29, 44, 0.2), transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(107, 21, 32, 0.25), transparent 60%),
                        #0a0508;
        }

        /* FULLSCREEN CONTAINER */
        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* OFF STATE CARD */
        .off-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }

        .off-card {
            max-width: 450px;
            width: 100%;
            background: rgba(20, 10, 14, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 28px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 20px rgba(155, 29, 44, 0.6);
            position: relative;
            overflow: hidden;
            text-align: center;
            animation: fadeScale 0.6s ease-out;
        }

        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .off-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(155, 29, 44, 0.15), transparent 70%);
            animation: rotateSlow 25s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            position: relative;
            z-index: 2;
        }

        .logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #9b1d2c;
            padding: 3px;
            background: #0a0508;
            box-shadow: 0 0 20px rgba(155, 29, 44, 0.6);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo-glow {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px dashed #9b1d2c;
            animation: rotateRing 12s linear infinite;
        }

        @keyframes rotateRing {
            to { transform: rotate(360deg); }
        }

        .off-card h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c41e3a, #9b1d2c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            position: relative;
            z-index: 2;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 11px;
            color: #b89aa3;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }

        .off-icon {
            font-size: 70px;
            color: #c41e3a;
            margin: 15px 0;
            text-shadow: 0 0 30px rgba(196, 30, 58, 0.7);
            animation: pulseGlow 2s infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(155, 29, 44, 0.6); }
            50% { text-shadow: 0 0 50px rgba(196, 30, 58, 0.8); }
        }

        .main-message {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin: 15px 0 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        .off-card p {
            font-size: 15px;
            color: #b89aa3;
            margin: 15px 0;
            position: relative;
            z-index: 2;
        }

        .decoration {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0 20px;
            position: relative;
            z-index: 2;
        }

        .decoration span {
            width: 40px;
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 9999px;
            animation: pulseWidth 2s infinite;
        }

        .decoration span:nth-child(2) {
            background: #9b1d2c;
            box-shadow: 0 0 8px rgba(155, 29, 44, 0.6);
            animation-delay: 0.3s;
        }

        @keyframes pulseWidth {
            0%, 100% { width: 40px; opacity: 0.5; }
            50% { width: 60px; opacity: 1; }
        }

        .footer-link {
            margin-top: 20px;
            position: relative;
            z-index: 2;
        }

        .footer-link a {
            color: #b89aa3;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
            font-size: 12px;
            background: rgba(20, 10, 14, 0.5);
        }

        .footer-link a:hover {
            color: #c41e3a;
            border-color: #9b1d2c;
            background: rgba(155, 29, 44, 0.15);
            box-shadow: 0 0 15px rgba(155, 29, 44, 0.6);
        }

        /* ON STATE - IFRAME DI DALAM APK */
        .on-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .on-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* LOADER IFRAME */
        .iframe-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 8, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
            backdrop-filter: blur(8px);
        }

        .iframe-loader .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #c41e3a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .iframe-loader p {
            color: #b89aa3;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 480px) {
            .off-card {
                padding: 30px 20px;
            }
            .main-message {
                font-size: 20px;
            }
            .off-icon {
                font-size: 55px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

<!-- 
    ==========================================================
    ✨ UBAH STATUS DI SINI ✨
    
    Ganti "off" menjadi "on" → LANGSUNG TAMPIL WEB DI DALEM APK
    Ganti "on" menjadi "off" → TAMPILKAN halaman SERVER OFF
    ==========================================================
-->
<div id="app" data-status="on"></div>
<!-- ========================================================== -->


<!-- OFF STATE (tampilan server off) -->
<div id="offState" class="fullscreen off-container">
    <div class="off-card">
        <div class="logo">
            <div class="logo-glow"></div>
            <img src="https://files.catbox.moe/gzsifl.jpeg" alt="Gojo Vip">
        </div>
        <h1>GOJO VIP</h1>
        <div class="subtitle">Ada masalah? kontak telegram @CENTRALVEX</div>
        <div class="off-icon">
            <i class="fa-solid fa-server"></i>
        </div>
        <div class="main-message">SERVER SEDANG OFF</div>
        <p>MOHON BERSABAR SAMPAI SERVER ONLINE</p>
        <div class="decoration">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="footer-link">
            <a href="https://t.me/CENTRALVEX" target="_blank">
                <i class="fa-brands fa-telegram"></i>
                Kontak @CENTRALVEX
            </a>
        </div>
    </div>
</div>

<!-- ON STATE (iframe di dalem APK, bukan ke Chrome) -->
<div id="onState" class="fullscreen on-container hidden">
    <div id="iframeLoader" class="iframe-loader">
        <div class="spinner"></div>
        <p>Menghubungkan ke server...</p>
    </div>
    <iframe id="serverFrame" src="about:blank"></iframe>
</div>

<script>
    // =================================================
    // BACA STATUS DARI DIV data-status
    // "off" = tampilkan halaman offline
    // "on"  = tampilkan web di DALEM IFRAME (tetap di APK)
    // =================================================
    const appDiv = document.getElementById('app');
    let serverStatus = appDiv.getAttribute('data-status'); // "off" atau "on"
    
    const offState = document.getElementById('offState');
    const onState = document.getElementById('onState');
    const serverFrame = document.getElementById('serverFrame');
    const iframeLoader = document.getElementById('iframeLoader');
    
    const SERVER_URL = "http://centralvex.anti-ddos.me:4000";
    
    if (serverStatus === "on") {
        // TAMPILKAN IFRAME DI DALEM APK (GAK KE CHROME)
        offState.classList.add('hidden');
        onState.classList.remove('hidden');
        
        // Load iframe
        serverFrame.src = SERVER_URL;
        
        // Hilangkan loader setelah iframe load
        serverFrame.onload = function() {
            setTimeout(() => {
                iframeLoader.classList.add('hidden');
            }, 500);
        };
        
        // Fallback loader
        setTimeout(() => {
            if (!iframeLoader.classList.contains('hidden')) {
                iframeLoader.classList.add('hidden');
            }
        }, 8000);
        
        // Jika error
        serverFrame.onerror = function() {
            iframeLoader.classList.add('hidden');
            console.error("Gagal load server");
        };
        
    } else {
        // TAMPILKAN OFF STATE
        offState.classList.remove('hidden');
        onState.classList.add('hidden');
    }
    
    // MATIKAN SEMUA LINK YANG MAU BUKA KE CHROME/EXTERNAL
    // Biar semua tetep di dalem iframe/APK
    document.addEventListener('click', function(e) {
        let target = e.target.closest('a');
        if (target && target.getAttribute('href') && target.getAttribute('target') === '_blank') {
            e.preventDefault();
            // Biarkan link telegram tetep bisa dibuka? 
            // Kalo mau buka di dalem bisa pake ini
            if (target.href.includes('t.me')) {
                // optional, bisa dibiarkan atau di prevent
            }
        }
    });
</script>

</body>
</html>
