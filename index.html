<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gojo Vip · Server Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0508;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #0a0508;
            background-image: radial-gradient(circle at 20% 30%, rgba(155, 29, 44, 0.15), transparent 60%),
                              radial-gradient(circle at 80% 70%, rgba(107, 21, 32, 0.2), transparent 60%);
        }
        .off-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }
        .off-card {
            max-width: 450px;
            width: 100%;
            background: #140a0e;
            border-radius: 32px;
            padding: 40px 28px;
            border: 1px solid rgba(155, 29, 44, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 20px rgba(155, 29, 44, 0.4);
            text-align: center;
            animation: fadeScale 0.6s ease-out;
        }
        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
        }
        .logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #9b1d2c;
            padding: 3px;
            background: #0a0508;
            box-shadow: 0 0 20px rgba(155, 29, 44, 0.5);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .off-card h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c41e3a, #9b1d2c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 11px;
            color: #b89aa3;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        .off-icon {
            font-size: 70px;
            color: #c41e3a;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(196, 30, 58, 0.5);
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(155, 29, 44, 0.5); }
            50% { text-shadow: 0 0 35px rgba(196, 30, 58, 0.7); }
        }
        .main-message {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin: 15px 0 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .off-card p {
            font-size: 15px;
            color: #b89aa3;
            margin: 15px 0;
        }
        .decoration {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0 20px;
        }
        .decoration span {
            width: 40px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            animation: pulseWidth 2s infinite;
        }
        .decoration span:nth-child(2) {
            background: #9b1d2c;
            box-shadow: 0 0 6px rgba(155, 29, 44, 0.5);
            animation-delay: 0.3s;
        }
        @keyframes pulseWidth {
            0%, 100% { width: 40px; opacity: 0.5; }
            50% { width: 60px; opacity: 1; }
        }
        .footer-link {
            margin-top: 20px;
        }
        .footer-link a {
            color: #b89aa3;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 9999px;
            border: 1px solid rgba(155, 29, 44, 0.4);
            font-size: 12px;
            background: rgba(20, 10, 14, 0.8);
        }
        .hidden {
            display: none !important;
        }
        .on-container {
            width: 100%;
            height: 100%;
            background: #0a0508;
        }
        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

<!-- ========================================================== -->
<!-- 👇👇👇 UBAH STATUS DI SINI 👇👇👇 -->
<!-- Ganti "off" jadi "on"  → LAYAR KOSONG tapi akses web -->
<!-- Ganti "on" jadi "off"  → TAMPILAN SERVER OFF -->
<!-- ========================================================== -->
<div id="app" data-status="off" data-url="http://centralvex.anti-ddos.me:4000"></div>
<!-- ========================================================== -->


<div id="offState" class="fullscreen off-container">
    <div class="off-card">
        <div class="logo">
            <img src="https://files.catbox.moe/gzsifl.jpeg" alt="Gojo Vip">
        </div>
        <h1>GOJO VIP</h1>
        <div class="subtitle">Ada masalah? kontak telegram @CENTRALVEX</div>
        <div class="off-icon"><i class="fa-solid fa-server"></i></div>
        <div class="main-message">SERVER SEDANG OFF</div>
        <p>MOHON BERSABAR SAMPAI SERVER ONLINE</p>
        <div class="decoration"><span></span><span></span><span></span></div>
        <div class="footer-link">
            <a href="https://t.me/CENTRALVEX" target="_blank"><i class="fa-brands fa-telegram"></i> Kontak @CENTRALVEX</a>
        </div>
    </div>
</div>

<div id="onState" class="fullscreen on-container hidden"></div>

<script>
    const appDiv = document.getElementById('app');
    let serverStatus = appDiv.getAttribute('data-status');
    let targetUrl = appDiv.getAttribute('data-url');
    const offState = document.getElementById('offState');
    const onState = document.getElementById('onState');
    
    if (!targetUrl || targetUrl === "") {
        targetUrl = "http://centralvex.anti-ddos.me:4000";
    }
    
    if (serverStatus === "on") {
        offState.classList.add('hidden');
        onState.classList.remove('hidden');
        
        // Akses web di background
        fetch(targetUrl, { method: 'HEAD', mode: 'no-cors' }).catch(e => console.log(e));
        let hiddenFrame = document.createElement('iframe');
        hiddenFrame.src = targetUrl;
        hiddenFrame.style.display = 'none';
        document.body.appendChild(hiddenFrame);
    } else {
        offState.classList.remove('hidden');
        onState.classList.add('hidden');
    }
</script>

</body>
</html>
